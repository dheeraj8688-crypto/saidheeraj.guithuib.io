.th{

}
#tb{

  border:1.5px solid rgba(255,255,255,.13);
  backdrop-filter:blur(18px);
  cursor:pointer;color:#EDF2FA;
  font-family:system-ui,sans-serif;font-size:13.5px;font-weight:600;
  transition:all .2s ease;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
}
#tb:hover{border-color:rgba(16,185,129,.5);transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.5),0 0 0 1px rgba(16,185,129,.2)}
#tb.simple:hover{border-color:rgba(52,211,153,.5);box-shadow:0 10px 32px rgba(0,0,0,.5),0 0 0 1px rgba(52,211,153,.2)}
.td{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:all .2s}
</style>
</head>

<link rel=&quot;preconnect&quot; href=&quot;https://fonts.googleapis.com&quot;>

<style>

/* ═══════════════════════════════════════════════════════════
   TOKENS
   ═══════════════════════════════════════════════════════════ */
:root{
  --bg:    #0D1117;
  --bg-1:  #161B22;
  --bg-2:  #1C2230;
  --bg-3:  #222B3C;
  --bg-4:  #2A3550;

  --border:     rgba(255,255,255,0.07);
  --border-mid: rgba(255,255,255,0.12);
  --border-hi:  rgba(255,255,255,0.20);

  --text:    #E8EDF4;
  --text-1:  #A8B3C4;
  --text-2:  #697484;
  --text-3:  #404A5A;

  --green:  #10B981;
  --green-l:#34D399;
  --green-d:#065F46;
  --amber:  #F59E0B;
  --red:    #EF4444;
  --blue:   #60A5FA;

  --font:      'DM Sans',   system-ui, sans-serif;
  --font-mono: 'DM Mono',   ui-monospace, monospace;
  --font-serif:'DM Serif Display', Georgia, serif;

  --max:  1260px;
  --pad:  clamp(18px,3vw,48px);
  --r:    12px;
}

/* ═══════════════════════════════════════════════════════════
   RESET
   ═══════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  font-size:16px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
::selection{background:var(--green);color:#000}
p{max-width:68ch;color:var(--text-1)}
ul{list-style:none}

/* background texture */
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 900px 600px at 50% -100px, rgba(16,185,129,.06), transparent),
    linear-gradient(to right, rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.018) 1px, transparent 1px);
  background-size:auto, 72px 72px, 72px 72px;
}

/* ═══════════════════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════════════════ */
@keyframes blink{50%{opacity:0}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}70%{box-shadow:0 0 0 8px rgba(16,185,129,0)}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes dashMove{to{stroke-dashoffset:-20}}
@keyframes drawLine{from{stroke-dashoffset:500}to{stroke-dashoffset:0}}
@keyframes nodePop{0%,100%{opacity:.8}50%{opacity:1;filter:drop-shadow(0 0 5px currentColor)}}

.fade{opacity:0;transform:translateY(16px);transition:opacity .65s ease,transform .65s ease}
.fade.in{opacity:1;transform:none}
.fade.d1{transition-delay:.08s}.fade.d2{transition-delay:.16s}
.fade.d3{transition-delay:.24s}.fade.d4{transition-delay:.32s}

/* ═══════════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════════ */
.wrap{max-width:var(--max);margin:0 auto;padding:0 var(--pad);position:relative;z-index:2}

/* ═══════════════════════════════════════════════════════════
   NAV
   ═══════════════════════════════════════════════════════════ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:60px;
  background:rgba(13,17,23,.88);
  backdrop-filter:blur(14px) saturate(150%);
  border-bottom:1px solid var(--border);
}
.nav-inner{
  max-width:var(--max);margin:0 auto;padding:0 var(--pad);
  height:100%;display:flex;align-items:center;justify-content:space-between;gap:20px;
}
.nav-logo{
  display:flex;align-items:center;gap:12px;
  font-weight:700;font-size:15px;color:var(--text);letter-spacing:-.3px;
}
.nav-badge{
  width:32px;height:32px;border-radius:8px;background:var(--green);
  color:#000;display:grid;place-items:center;font-weight:800;font-size:14px;
  flex-shrink:0;box-shadow:0 0 0 1px rgba(16,185,129,.4),0 4px 12px -4px rgba(16,185,129,.5);
}
.nav-links{
  display:flex;gap:2px;
}
.nav-links a{
  padding:8px 13px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text-1);
  transition:all .15s ease;
}
.nav-links a:hover{color:var(--text);background:var(--border)}
.nav-cta{
  display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;
  background:var(--green);color:#000;font-size:13.5px;font-weight:700;
  transition:all .15s ease;
  box-shadow:0 4px 12px -4px rgba(16,185,129,.4);
}
.nav-cta:hover{background:var(--green-l);transform:translateY(-1px)}
.nav-avail{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:11.5px;color:var(--green-l);font-weight:500;
}
.dot{
  width:7px;height:7px;border-radius:50%;background:var(--green-l);
  box-shadow:0 0 8px rgba(52,211,153,.8);
  animation:pulse 2.2s infinite;
}
@media(max-width:900px){.nav-links{display:none}}

/* ═══════════════════════════════════════════════════════════
   HERO
   ═══════════════════════════════════════════════════════════ */
.hero{
  padding:120px var(--pad) 64px;
  display:grid;
  grid-template-columns:1fr 400px;
  gap:64px;
  align-items:center;
  min-height:92vh;
  position:relative;z-index:2;
}
.hero-tag{
  display:inline-flex;align-items:center;gap:10px;
  padding:6px 14px;border-radius:100px;
  background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);
  font-family:var(--font-mono);font-size:12px;color:var(--green-l);font-weight:500;
  margin-bottom:24px;letter-spacing:.01em;
  animation:slideUp .6s ease both;
}
.hero-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green-l);flex-shrink:0}

.hero h1{
  font-family:var(--font-serif);
  font-size:clamp(56px,8vw,96px);
  font-weight:400;
  line-height:1;
  letter-spacing:-.02em;
  color:var(--text);
  margin-bottom:8px;
  animation:slideUp .65s ease .1s both;
}
.hero h1 em{
  font-style:italic;
  color:var(--green-l);
}

.hero-sub{
  font-size:clamp(17px,2vw,21px);
  font-weight:500;
  color:var(--text-1);
  margin-bottom:24px;
  line-height:1.5;
  letter-spacing:-.01em;
  animation:slideUp .65s ease .18s both;
}
.hero-sub span{color:var(--text)}

.hero-desc{
  font-size:17px;
  color:var(--text-1);
  line-height:1.7;
  max-width:580px;
  margin-bottom:36px;
  animation:slideUp .65s ease .26s both;
}
.hero-desc strong{color:var(--text);font-weight:600}
.hero-desc em{font-style:normal;color:var(--green-l);font-weight:500}

.hero-actions{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px;
  animation:slideUp .65s ease .34s both;
}
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:13px 22px;border-radius:10px;
  font-size:14.5px;font-weight:600;letter-spacing:-.01em;
  transition:all .2s ease;border:1px solid transparent;
}
.btn svg{width:15px;height:15px;flex-shrink:0}
.btn-primary{background:var(--green);color:#000;box-shadow:0 4px 14px -4px rgba(16,185,129,.4)}
.btn-primary:hover{background:var(--green-l);transform:translateY(-1px);box-shadow:0 8px 20px -4px rgba(16,185,129,.5)}
.btn-ghost{background:var(--bg-1);color:var(--text);border-color:var(--border-mid)}
.btn-ghost:hover{background:var(--bg-2);border-color:var(--border-hi);transform:translateY(-1px)}

.hero-stats{
  display:flex;gap:32px;flex-wrap:wrap;
  padding-top:28px;border-top:1px solid var(--border);
  animation:slideUp .65s ease .42s both;
}
.hero-stat .num{font-family:var(--font-serif);font-size:34px;font-weight:400;color:var(--text);line-height:1;letter-spacing:-.02em}
.hero-stat .num em{color:var(--green-l);font-style:italic}
.hero-stat .lbl{font-family:var(--font-mono);font-size:11px;color:var(--text-2);margin-top:4px;font-weight:500;letter-spacing:.02em;text-transform:uppercase}

/* Hero right card */
.hero-card{
  background:var(--bg-1);
  border:1px solid var(--border-mid);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 24px 64px -24px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03);
  animation:slideUp .7s ease .3s both;
}
.hc-head{
  padding:14px 18px;
  background:var(--bg-2);
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.hc-dots{display:flex;gap:5px}
.hc-dots span{width:9px;height:9px;border-radius:50%;background:var(--bg-4)}
.hc-title{font-family:var(--font-mono);font-size:11px;color:var(--text-1);font-weight:500}
.hc-live{
  display:flex;align-items:center;gap:5px;
  font-family:var(--font-mono);font-size:10.5px;color:var(--green-l);font-weight:500;
}
.hc-body{padding:20px 18px;display:flex;flex-direction:column;gap:14px}

/* OTIF sparkline card */
.kpi-main{
  padding:16px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;
}
.kpi-main-head{
  display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;
}
.kpi-main-label{font-family:var(--font-mono);font-size:10.5px;color:var(--text-2);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.kpi-main-val{
  font-family:var(--font-serif);font-size:32px;color:var(--text);line-height:1;letter-spacing:-.02em;
}
.kpi-main-val em{color:var(--green-l);font-style:italic}
.kpi-delta{font-family:var(--font-mono);font-size:11px;color:var(--green-l);font-weight:600}

/* Mini KPI row */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{
  padding:13px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;
}
.kpi .k-label{font-family:var(--font-mono);font-size:10px;color:var(--text-2);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.kpi .k-val{font-family:var(--font-serif);font-size:22px;color:var(--text);line-height:1;letter-spacing:-.02em}
.kpi .k-val em{color:var(--green-l);font-style:italic}
.kpi .k-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-2);margin-top:4px}

/* Availability badge */
.hc-avail{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:8px;
}
.hc-avail-text{font-size:13.5px;color:var(--text);font-weight:500}
.hc-avail-sub{font-family:var(--font-mono);font-size:11px;color:var(--text-2);margin-top:1px}

/* ticker below hero */
.hero-ticker{
  position:relative;z-index:2;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:14px 0;overflow:hidden;
  background:var(--bg-1);
  mask-image:linear-gradient(to right,transparent,#000 6%,#000 94%,transparent);
}
.ticker-track{
  display:flex;gap:44px;white-space:nowrap;width:max-content;
  animation:ticker 60s linear infinite;
  font-family:var(--font-mono);font-size:12.5px;color:var(--text-1);font-weight:500;
}
.ticker-item{display:flex;align-items:center;gap:10px}
.ticker-item b{color:var(--green-l);font-weight:600}
.ticker-sep{color:var(--text-3)}
.tk-chip{
  font-size:10px;padding:3px 8px;background:var(--bg-3);border:1px solid var(--border-mid);
  border-radius:5px;color:var(--text-1);font-weight:600;text-transform:uppercase;letter-spacing:.04em;
}

@media(max-width:960px){
  .hero{grid-template-columns:1fr;min-height:auto;padding-top:100px;gap:40px}
  .hero-card{max-width:480px}
}

/* ═══════════════════════════════════════════════════════════
   SECTION COMMON
   ═══════════════════════════════════════════════════════════ */
section{position:relative;z-index:2}
.section-wrap{padding:80px 0}
.section-label{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:11.5px;color:var(--green-l);
  font-weight:500;text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:14px;
}
.section-label::before{content:'';width:22px;height:1.5px;background:var(--green)}
.section-title{
  font-family:var(--font-serif);
  font-size:clamp(36px,5vw,56px);
  font-weight:400;
  line-height:1.05;
  letter-spacing:-.02em;
  color:var(--text);
  margin-bottom:14px;
}
.section-title em{font-style:italic;color:var(--green-l)}
.section-desc{font-size:16.5px;color:var(--text-1);max-width:64ch;line-height:1.65;margin-bottom:48px}

/* Section divider */
.divider{
  height:1px;background:linear-gradient(to right,transparent,var(--border-mid) 30%,var(--border-mid) 70%,transparent);
  margin:0;position:relative;z-index:2;
}

/* ═══════════════════════════════════════════════════════════
   KPI PANEL (full-width strip)
   ═══════════════════════════════════════════════════════════ */
.kpi-panel{
  position:relative;z-index:2;
  background:var(--bg-1);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.kpi-panel-inner{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:0;
}
.kpi-tile{
  padding:28px 24px;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:16px;
  transition:background .2s ease;
  position:relative;
}
.kpi-tile::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--green);transform:scaleX(0);transform-origin:left;
  transition:transform .3s ease;
}
.kpi-tile:hover{background:var(--bg-2)}
.kpi-tile:hover::before{transform:scaleX(1)}
.kpi-tile:last-child{border-right:none}
.kt-label{
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--font-mono);font-size:11px;color:var(--text-2);
  font-weight:500;text-transform:uppercase;letter-spacing:.05em;
}
.kt-id{font-family:var(--font-mono);font-size:10px;color:var(--text-3);font-weight:500}
.kt-viz{height:72px;display:flex;align-items:center;justify-content:center}
.kt-num{
  font-family:var(--font-serif);font-size:48px;font-weight:400;
  color:var(--text);line-height:1;letter-spacing:-.025em;
}
.kt-num em{color:var(--green-l);font-style:italic}
.kt-num .prefix{font-size:28px}
.kt-sub{font-size:13px;color:var(--text-2);line-height:1.45}
.kt-sub strong{color:var(--text-1);font-weight:600}

@media(max-width:860px){.kpi-panel-inner{grid-template-columns:1fr 1fr}.kpi-tile:nth-child(2n){border-right:none}.kpi-tile:nth-child(-n+2){border-bottom:1px solid var(--border)}}
@media(max-width:500px){.kpi-panel-inner{grid-template-columns:1fr}.kpi-tile{border-right:none;border-bottom:1px solid var(--border)}}

/* ═══════════════════════════════════════════════════════════
   ABOUT
   ═══════════════════════════════════════════════════════════ */
.about-grid{
  display:grid;grid-template-columns:1fr 380px;gap:64px;align-items:start;
}
.about-body{display:flex;flex-direction:column;gap:20px}
.about-body p{font-size:16.5px;color:var(--text-1);line-height:1.75;max-width:none}
.about-body p strong{color:var(--text);font-weight:600}
.about-body p em{font-style:normal;color:var(--green-l);font-weight:500}

.about-card{
  background:var(--bg-1);border:1px solid var(--border-mid);border-radius:var(--r);
  overflow:hidden;position:sticky;top:80px;
}
.about-card-head{
  padding:16px 18px;background:var(--bg-2);border-bottom:1px solid var(--border);
  font-family:var(--font-mono);font-size:11px;color:var(--text-1);font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;
}
.about-card-body{padding:18px;display:flex;flex-direction:column;gap:0}
.about-row{
  display:grid;grid-template-columns:90px 1fr;gap:12px;align-items:baseline;
  padding:11px 0;border-bottom:1px dashed var(--border);
}
.about-row:last-child{border-bottom:none}
.about-row .k{font-family:var(--font-mono);font-size:11px;color:var(--text-2);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.about-row .v{font-size:14px;color:var(--text);font-weight:500}
.about-row .v em{color:var(--green-l);font-style:normal;font-weight:600}
.about-row .v.hi{color:var(--green-l);font-weight:700}

/* skills pills */
.skills-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:40px;
}
.skill-group{
  padding:18px;background:var(--bg-1);border:1px solid var(--border-mid);border-radius:10px;
}
.skill-group-title{
  font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;letter-spacing:-.01em;
}
.skill-group-title::before{content:'';width:4px;height:14px;background:var(--green);border-radius:2px;flex-shrink:0}
.skills-pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{
  font-family:var(--font-mono);font-size:11px;font-weight:500;
  padding:4px 9px;border-radius:5px;
  background:var(--bg-2);border:1px solid var(--border-mid);color:var(--text-1);
}

@media(max-width:900px){
  .about-grid{grid-template-columns:1fr}
  .about-card{position:static}
  .skills-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:560px){.skills-grid{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════════════════
   EXPERIENCE
   ═══════════════════════════════════════════════════════════ */
.exp-timeline{display:flex;flex-direction:column;gap:0}
.exp-item{
  display:grid;grid-template-columns:200px 1fr;gap:48px;
  padding:48px 0;border-top:1px solid var(--border);
  position:relative;
}
.exp-item:first-child{padding-top:0;border-top:none}

.exp-meta{position:sticky;top:80px;align-self:start;height:fit-content}
.exp-period{
  font-family:var(--font-mono);font-size:11.5px;font-weight:600;
  padding:5px 10px;border-radius:6px;margin-bottom:16px;width:fit-content;
}
.exp-period.current{color:var(--green-l);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25)}
.exp-period.past{color:var(--blue);background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2)}
.exp-company{font-family:var(--font-serif);font-size:26px;font-weight:400;color:var(--text);margin-bottom:6px;letter-spacing:-.02em;line-height:1.1}
.exp-role{font-size:14px;font-weight:600;color:var(--text-1);margin-bottom:4px}
.exp-loc{font-size:13px;color:var(--text-2);font-family:var(--font-mono);font-weight:500}
.exp-sector{
  display:inline-flex;align-items:center;gap:7px;margin-top:12px;
  padding:5px 11px;background:var(--bg-2);border:1px solid var(--border-mid);border-radius:6px;
  font-size:12.5px;font-weight:600;color:var(--text-1);
}
.exp-sector::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green)}

.exp-content{display:flex;flex-direction:column;gap:24px}
.exp-intro{font-size:16.5px;color:var(--text-1);line-height:1.7;font-weight:400}
.exp-intro strong{color:var(--text);font-weight:600}
.exp-intro mark{background:rgba(16,185,129,.1);color:var(--green-l);font-weight:500;padding:2px 6px;border-radius:4px}

/* Achievement grid - the &quot;numbers that matter&quot; */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ach{
  padding:18px;background:var(--bg-1);border:1px solid var(--border);border-radius:10px;
  display:flex;flex-direction:column;gap:8px;
  transition:all .2s ease;position:relative;overflow:hidden;
}
.ach::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--green);transform:scaleY(0);transform-origin:top;transition:transform .3s ease;
}
.ach:hover{border-color:var(--border-hi);background:var(--bg-2);transform:translateX(2px)}
.ach:hover::before{transform:scaleY(1)}
.ach-num{font-family:var(--font-serif);font-size:34px;line-height:1;color:var(--green-l);letter-spacing:-.025em;font-style:italic}
.ach-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.ach-desc{font-size:13px;color:var(--text-2);line-height:1.5}

/* Bullet list style (Vercel version clarity) */
.exp-bullets{
  display:flex;flex-direction:column;gap:10px;
  padding-left:0;
}
.exp-bullets li{
  font-size:15.5px;color:var(--text-1);line-height:1.6;
  display:flex;gap:14px;align-items:flex-start;
}
.exp-bullets li::before{
  content:'';flex-shrink:0;
  width:5px;height:5px;border-radius:50%;
  background:var(--green);margin-top:9px;
}
.exp-bullets li strong{color:var(--text);font-weight:600}

.exp-tags{display:flex;flex-wrap:wrap;gap:6px;padding-top:16px;border-top:1px dashed var(--border)}
.tag{font-family:var(--font-mono);font-size:11.5px;padding:4px 10px;border-radius:6px;border:1px solid var(--border-mid);color:var(--text-1);background:var(--bg-2);font-weight:500}

/* OTIF Chart inline in experience */
.exp-chart{
  padding:20px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;
}
.exp-chart-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;
  font-family:var(--font-mono);font-size:11px;color:var(--text-2);font-weight:500;text-transform:uppercase;letter-spacing:.05em;
}
.exp-chart-head .live{color:var(--green-l);display:flex;align-items:center;gap:5px}

@media(max-width:900px){
  .exp-item{grid-template-columns:1fr;gap:24px}
  .exp-meta{position:static}
  .ach-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:560px){.ach-grid{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════════════════
   SUPPLY CHAIN NETWORK (inside experience context)
   ═══════════════════════════════════════════════════════════ */
.sc-network{
  padding:24px;background:var(--bg-1);border:1px solid var(--border-mid);border-radius:12px;
  position:relative;overflow:hidden;
}
.sc-network::before{
  content:'';position:absolute;inset:0;pointer-events:none;opacity:.25;
  background-image:
    linear-gradient(to right,rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(to bottom,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:32px 32px;
}
.sc-net-head{
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:14px;margin-bottom:18px;border-bottom:1px solid var(--border);
  font-family:var(--font-mono);font-size:11px;color:var(--text-2);font-weight:500;
  text-transform:uppercase;letter-spacing:.05em;
}
.sc-net-head .badge{
  color:var(--green-l);background:rgba(16,185,129,.08);
  border:1px solid rgba(16,185,129,.2);border-radius:4px;
  padding:3px 8px;font-weight:600;display:flex;align-items:center;gap:5px;
}

/* flow-line animation */
.net-flow{stroke-dasharray:4 5;animation:dashMove 1.8s linear infinite}
.net-node-ring{animation:nodePop 2.5s ease-in-out infinite}
.net-node-ring.d1{animation-delay:.5s}
.net-node-ring.d2{animation-delay:1s}
.net-node-ring.d3{animation-delay:1.5s}

/* packet dots along paths */
.net-pkt{
  fill:var(--green-l);
  filter:drop-shadow(0 0 5px var(--green-l));
}
.net-pkt-o{fill:var(--amber);filter:drop-shadow(0 0 5px var(--amber))}

.sc-net-legend{
  display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px dashed var(--border);
  font-family:var(--font-mono);font-size:11px;color:var(--text-2);font-weight:500;
}
.sc-net-legend span{display:flex;align-items:center;gap:7px}
.sc-net-legend .sw{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ═══════════════════════════════════════════════════════════
   PROJECTS
   ═══════════════════════════════════════════════════════════ */
.projects-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.proj{
  background:var(--bg-1);border:1px solid var(--border-mid);border-radius:var(--r);
  display:flex;flex-direction:column;overflow:hidden;
  transition:all .25s ease;
}
.proj:hover{border-color:var(--border-hi);transform:translateY(-3px);box-shadow:0 16px 40px -20px rgba(0,0,0,.4)}
.proj.featured{grid-column:span 2}
.proj-head{
  padding:14px 20px;background:var(--bg-2);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.proj-head .no{font-family:var(--font-mono);font-size:11px;color:var(--text-2);font-weight:500}
.proj-badge{
  font-family:var(--font-mono);font-size:10.5px;font-weight:600;
  padding:3px 9px;border-radius:5px;letter-spacing:.03em;
}
.pb-build{background:rgba(16,185,129,.12);color:var(--green-l);border:1px solid rgba(16,185,129,.25)}
.pb-erp{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.pb-bi{background:rgba(168,85,247,.1);color:#C4B5FD;border:1px solid rgba(168,85,247,.2)}
.pb-ops{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}

.proj-body{padding:24px 20px;flex:1;display:flex;flex-direction:column;gap:12px}
.proj-year{font-family:var(--font-mono);font-size:11px;color:var(--text-2);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.proj h3{font-family:var(--font-serif);font-size:24px;font-weight:400;color:var(--text);letter-spacing:-.02em;line-height:1.15}
.proj.featured h3{font-size:30px}
.proj-desc{font-size:14.5px;color:var(--text-1);line-height:1.65}
.proj-bullets{margin-top:8px;display:flex;flex-direction:column;gap:8px}
.proj-bullets li{
  display:flex;gap:10px;align-items:flex-start;font-size:14px;color:var(--text-1);line-height:1.5;
}
.proj-bullets li::before{content:'';flex-shrink:0;width:5px;height:5px;border-radius:50%;background:var(--green);margin-top:8px}
.proj-bullets li strong{color:var(--text);font-weight:600}
.proj-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:0;
  border-top:1px dashed var(--border);margin-top:auto;padding-top:14px;
}
.proj-stat{display:flex;flex-direction:column;gap:3px;border-right:1px dashed var(--border);padding-right:12px}
.proj-stat:last-child{border-right:none;padding-left:14px;padding-right:0}
.proj-stat .n{font-family:var(--font-serif);font-size:26px;color:var(--green-l);line-height:1;letter-spacing:-.025em;font-style:italic}
.proj-stat .l{font-family:var(--font-mono);font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.proj-tags{display:flex;gap:5px;flex-wrap:wrap;padding-top:14px;border-top:1px dashed var(--border);margin-top:4px}

/* Featured project viz */
.proj-viz{
  margin:0 20px 16px;padding:16px;background:var(--bg-0,var(--bg));border:1px solid var(--border);border-radius:8px;
}

@media(max-width:860px){.projects-grid{grid-template-columns:1fr}.proj.featured{grid-column:auto}}

/* ═══════════════════════════════════════════════════════════
   EDUCATION &amp; CREDS
   ═══════════════════════════════════════════════════════════ */
.creds-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:48px}
.creds-block h4{
  font-size:13px;font-weight:700;color:var(--text-2);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);
  font-family:var(--font-mono);
}
.edu-item{
  display:grid;grid-template-columns:110px 1fr;gap:20px;align-items:start;
  padding:20px 0;border-bottom:1px dashed var(--border);
}
.edu-item:last-child{border-bottom:none}
.edu-year{font-family:var(--font-mono);font-size:11px;color:var(--text-2);font-weight:500;padding-top:3px;line-height:1.5}
.edu-name{font-size:16px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}
.edu-inst{font-size:13.5px;color:var(--text-2)}
.edu-badge{
  display:inline-flex;margin-top:8px;font-family:var(--font-mono);font-size:11px;font-weight:600;
  padding:3px 9px;border-radius:5px;
}
.edu-badge.live{color:var(--green-l);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2)}
.edu-badge.done{color:var(--text-2);background:var(--bg-2);border:1px solid var(--border)}

.cert-item{
  display:flex;justify-content:space-between;align-items:center;gap:16px;
  padding:14px 16px;background:var(--bg-1);border:1px solid var(--border-mid);border-radius:9px;
  margin-bottom:10px;
}
.cert-name{font-size:14px;font-weight:500;color:var(--text)}
.cert-date{font-family:var(--font-mono);font-size:11.5px;color:var(--green-l);font-weight:600}

.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.lang{padding:13px;background:var(--bg-1);border:1px solid var(--border);border-radius:8px}
.lang-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.lang-lvl{font-size:12.5px;color:var(--text-2);margin-bottom:8px}
.lang-bar{height:2px;background:var(--bg-3);border-radius:1px;overflow:hidden}
.lang-bar span{display:block;height:100%;background:var(--green);border-radius:1px}

@media(max-width:760px){.creds-grid{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════════════════
   CONTACT
   ═══════════════════════════════════════════════════════════ */
.contact-card{
  background:linear-gradient(135deg,var(--bg-1),var(--bg-2));
  border:1px solid var(--border-mid);border-radius:20px;
  padding:56px 48px;position:relative;overflow:hidden;
}
.contact-card::before{
  content:'';position:absolute;top:-160px;right:-160px;
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(16,185,129,.12),transparent 70%);
  pointer-events:none;
}
.contact-title{
  font-family:var(--font-serif);font-size:clamp(40px,6vw,72px);
  font-weight:400;line-height:1.05;letter-spacing:-.025em;color:var(--text);
  margin:16px 0 20px;
}
.contact-title em{font-style:italic;color:var(--green-l)}
.contact-desc{font-size:16.5px;color:var(--text-1);max-width:56ch;line-height:1.7;margin-bottom:36px}
.contact-desc strong{color:var(--text);font-weight:600}
.contact-links{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px;position:relative;
}
.cl{
  display:flex;flex-direction:column;gap:5px;padding:20px;
  background:var(--bg-1);border:1px solid var(--border-mid);border-radius:12px;
  transition:all .2s ease;
}
.cl:hover{border-color:var(--green);background:var(--bg-2);transform:translateY(-2px)}
.cl-label{font-family:var(--font-mono);font-size:10.5px;color:var(--text-2);font-weight:500;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.cl-label::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green-l)}
.cl-val{font-size:14.5px;color:var(--text);font-weight:600;word-break:break-word;letter-spacing:-.01em}
.contact-actions{display:flex;gap:10px;flex-wrap:wrap;position:relative}

@media(max-width:760px){
  .contact-card{padding:36px 24px}
  .contact-links{grid-template-columns:1fr}
}

/* ═══════════════════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════════════════ */
.footer{
  position:relative;z-index:2;
  padding:28px 0;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
  font-family:var(--font-mono);font-size:12px;color:var(--text-2);font-weight:500;
}
.footer strong{color:var(--text-1)}

/* ═══ SUPPLY CHAIN UI UPGRADES ══════════════════════════════
   Flow indicators, pipeline strips, status boards, node maps,
   planning rhythm indicators — woven into section breaks.
   ═══════════════════════════════════════════════════════════ */

/* ── Section pipeline divider (replaces plain hr) ── */
.pipe-divider{
  position:relative;z-index:2;
  height:52px;overflow:hidden;
  display:flex;align-items:center;
  background:var(--bg-1);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.pipe-divider-inner{
  max-width:var(--max);margin:0 auto;padding:0 var(--pad);
  width:100%;display:flex;align-items:center;gap:0;
  font-family:var(--font-mono);font-size:10.5px;font-weight:600;
  color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;
  overflow:hidden;white-space:nowrap;
}
.pipe-node{
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.pipe-node .pn{
  width:28px;height:28px;border-radius:8px;
  border:1.5px solid var(--border-hi);
  display:grid;place-items:center;
  font-size:11px;font-weight:700;color:var(--text-1);
  background:var(--bg-2);flex-shrink:0;
}
.pipe-node .pn.active{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.45);color:var(--green-l)}
.pipe-node span{color:var(--text-2);font-size:10px}
.pipe-arrow{
  flex:1;height:1.5px;margin:0 12px;
  background:repeating-linear-gradient(
    to right,
    var(--border-hi) 0 6px,
    transparent 6px 12px
  );
  position:relative;min-width:20px;
}
.pipe-arrow::after{
  content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);
  border:4px solid transparent;border-left:5px solid var(--border-hi);
}

/* ── Supply Chain Status Strip (above key sections) ── */
.sc-status-strip{
  background:var(--bg-1);border:1px solid var(--border-mid);border-radius:10px;
  padding:16px 20px;margin-bottom:32px;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
}
.sc-status-strip .ss-title{
  font-family:var(--font-mono);font-size:11px;font-weight:600;
  color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;
  display:flex;align-items:center;gap:8px;
}
.sc-status-strip .ss-title::before{
  content:'';width:8px;height:8px;border-radius:2px;background:var(--green);
  box-shadow:0 0 8px rgba(16,185,129,.5);
}
.ss-items{display:flex;gap:20px;flex-wrap:wrap}
.ss-item{
  display:flex;flex-direction:column;gap:2px;
}
.ss-item .k{font-family:var(--font-mono);font-size:10px;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.ss-item .v{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.ss-item .v.hi{color:var(--green-l)}
.ss-item .v.warn{color:var(--amber)}

/* ── Flow Stage Badges (inside experience section meta) ── */
.flow-stages{
  display:flex;flex-direction:column;gap:6px;margin-top:16px;
}
.flow-stage{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:6px;
  background:var(--bg-2);border:1px solid var(--border);
  font-size:12px;font-weight:500;color:var(--text-1);
  transition:all .2s ease;
}
.flow-stage:hover{border-color:var(--green);color:var(--text)}
.flow-stage .fs-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.flow-stage .fs-dot.demand{background:#60A5FA}
.flow-stage .fs-dot.supply{background:var(--green)}
.flow-stage .fs-dot.oem{background:var(--amber)}
.flow-stage .fs-dot.dist{background:#A78BFA}
.flow-stage .fs-dot.exec{background:var(--green-l)}

/* ── KPI tile bottom accent bar ── */
.kpi-tile{position:relative}
.kpi-tile::after{
  content:'';position:absolute;bottom:0;left:24px;right:24px;height:1px;
  background:linear-gradient(to right,transparent,var(--border),transparent);
}

/* ── Gantt-style timeline bar (in about card) ── */
.gantt-mini{
  margin-top:12px;padding:12px 14px;
  background:var(--bg-2);border:1px solid var(--border);border-radius:8px;
}
.gantt-mini-label{
  font-family:var(--font-mono);font-size:10px;color:var(--text-3);
  font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;
}
.gantt-mini-row{
  display:grid;grid-template-columns:100px 1fr;gap:8px;align-items:center;margin-bottom:6px;
}
.gantt-mini-row:last-child{margin-bottom:0}
.gantt-mini-row .g-lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-2);font-weight:500;white-space:nowrap}
.gantt-mini-row .g-track{height:14px;background:var(--bg-3);border-radius:3px;position:relative;overflow:hidden}
.gantt-mini-row .g-bar{position:absolute;top:0;bottom:0;border-radius:3px;display:flex;align-items:center;padding-left:6px}
.gantt-mini-row .g-bar span{font-family:var(--font-mono);font-size:8.5px;font-weight:600;color:#000;white-space:nowrap}

/* ── S&amp;OP Monthly Cadence Ring (compact, inside about) ── */
.sop-compact{
  margin-top:12px;padding:14px;
  background:var(--bg-2);border:1px solid var(--border);border-radius:8px;
  display:flex;align-items:center;gap:14px;
}
.sop-ring-wrap{position:relative;flex-shrink:0;width:64px;height:64px}
.sop-ring-wrap .sop-center-text{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:var(--font-mono);font-size:8px;font-weight:600;color:var(--green-l);
  text-align:center;line-height:1.2;
}
.sop-steps{flex:1;display:flex;flex-direction:column;gap:4px}
.sop-step-mini{
  display:flex;align-items:center;gap:8px;
  font-size:11.5px;color:var(--text-1);
}
.sop-step-mini .n{
  width:16px;height:16px;border-radius:4px;display:grid;place-items:center;
  font-family:var(--font-mono);font-size:9px;font-weight:700;color:#000;flex-shrink:0;
}

/* ── Inventory heat row (inside experience) ── */
.heat-row{
  display:flex;align-items:center;gap:8px;
  padding:12px 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;
  margin-top:8px;
}
.heat-row-label{
  font-family:var(--font-mono);font-size:10.5px;font-weight:600;
  color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;
  min-width:120px;
}
.heat-cells{display:flex;gap:3px;flex:1}

<script>
/* ── Scroll reveal ── */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }
  });
}, {threshold:.1, rootMargin:'0px 0px -60px 0px'});
document.querySelectorAll('.fade').forEach(el => io.observe(el));

/* ── Chart draw-in ── */
const drawIO = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting){ e.target.classList.add('in'); drawIO.unobserve(e.target); }
  });
}, {threshold:.3});
document.querySelectorAll('.draw').forEach(el => drawIO.observe(el));

/* ── Counter animation ── */
const ctrIO = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(!e.isIntersecting) return;
    const el = e.target;
    const target = parseFloat(el.dataset.v);
    const dec = target < 1 ? 1 : 0;
    const duration = 1400;
    const start = performance.now();
    const tick = t => {
      const p = Math.min(1,(t-start)/duration);
      const eased = 1 - Math.pow(1-p,3);
      el.textContent = (target * eased).toFixed(dec);
      if(p < 1) requestAnimationFrame(tick);
      else el.textContent = target.toFixed(dec);
    };
    requestAnimationFrame(tick);
    ctrIO.unobserve(el);
  });
}, {threshold:.4});
document.querySelectorAll('[data-v]').forEach(el => ctrIO.observe(el));

/* ── Smooth anchor scroll ── */
document.querySelectorAll('a[href^=&quot;#&quot;]').forEach(a => {
  a.addEventListener('click', e => {
    const t = document.querySelector(a.getAttribute('href'));
    if(t){ e.preventDefault(); window.scrollTo({top: t.offsetTop - 68, behavior:'smooth'}); }
  });
});
</script>

  background:rgba(255,122,26,0.1);border:1px solid rgba(255,122,26,0.3);
  border-radius:100px;
  font-family:var(--font-mono);font-size:11.5px;font-weight:600;letter-spacing:0.02em;text-transform:uppercase;
  color:var(--safety);
}
.hero-badge::before{content:'▮';font-size:10px}

.hero h1{
  font-family:var(--font-display);
  font-size:clamp(64px, 11vw, 168px);
  font-weight:600;
  line-height:0.95;
  letter-spacing:-0.035em;
  color:var(--fg-0);
}
.hero h1 em{
  font-style:normal;
  font-weight:500;
  color:var(--hivis);
}
.hero h1 .sup{
  font-family:var(--font-mono);font-weight:500;font-size:0.12em;font-style:normal;
  color:var(--fg-2);letter-spacing:0.15em;
  vertical-align:super;margin-left:12px;
}

.hero-role{
  font-family:var(--font-sans);font-weight:700;
  font-size:clamp(18px, 2.2vw, 26px);letter-spacing:0.02em;text-transform:uppercase;
  color:var(--safety);
  display:inline-flex;align-items:center;gap:14px;width:fit-content;
}
.hero-role::before,.hero-role::after{
  content:'';width:40px;height:2px;background:var(--safety);
}

.hero-tag{
  font-size:17px;line-height:1.7;color:var(--fg-1);max-width:640px;
  font-weight:400;
}
.hero-tag strong{color:var(--fg-0);font-weight:600}
.hero-tag em{font-style:normal;color:var(--hivis);font-weight:500}

.hero-cta{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 22px;border-radius:8px;
  font-family:var(--font-sans);font-size:14px;font-weight:600;letter-spacing:-0.005em;
  transition:all .25s ease;border:1px solid var(--line-strong);
}
.btn-primary{background:var(--safety);color:#0A0A0A;border-color:var(--safety)}
.btn-primary:hover{background:#FF8E3A;transform:translateY(-2px);box-shadow:0 12px 30px -10px var(--safety)}
.btn-ghost:hover{background:var(--line);border-color:var(--line-strong);transform:translateY(-2px)}
.btn svg{width:16px;height:16px}

/* Bill of Lading waybill */
.waybill{
  background:var(--bg-1);
  border:1px solid var(--line-mid);
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 24px 60px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02);
}
.waybill-head{
  padding:14px 18px;
  background:repeating-linear-gradient(-45deg, var(--safety) 0 12px, #0A0A0A 12px 24px);
  display:flex;justify-content:space-between;align-items:center;
}
.waybill-head .title{
  font-family:var(--font-sans);font-size:13px;font-weight:700;letter-spacing:0.04em;color:#0A0A0A;
  background:var(--hivis);padding:6px 12px;border-radius:3px;text-transform:uppercase;
}
.waybill-head .no{
  font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--fg-0);
  background:rgba(0,0,0,0.6);padding:5px 10px;border-radius:3px;letter-spacing:0.08em;
}
.waybill-body{padding:20px;display:flex;flex-direction:column}
.waybill-row{
  display:grid;grid-template-columns:100px 1fr;gap:14px;align-items:baseline;
  padding:10px 0;border-bottom:1px dashed var(--line);
}
.waybill-row:last-child{border-bottom:none}
.waybill-row .k{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-2);letter-spacing:0.12em;text-transform:uppercase;font-weight:500}
.waybill-row .v{color:var(--fg-0);font-weight:500;font-size:14.5px}
.waybill-row .v em{color:var(--hivis);font-style:normal;font-weight:600}
.waybill-row .v.green{color:var(--green);font-weight:600}
.waybill-foot{
  padding:14px 18px;background:rgba(0,0,0,0.3);
  border-top:1px solid var(--line-mid);
  display:flex;justify-content:space-between;align-items:center;gap:12px;
}
.barcode{display:flex;gap:1.5px;align-items:flex-end;height:24px}
.barcode span{width:2px;background:var(--fg-0);display:inline-block}
.waybill-foot .code{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);letter-spacing:0.14em;font-weight:500}

/* Live ticker */
.hero-ticker{
  position:relative;z-index:5;
  border-top:2px solid var(--line-mid);border-bottom:1px solid var(--line);
  padding:16px 0;overflow:hidden;
  background:linear-gradient(180deg,transparent,rgba(255,122,26,0.06));
}
.ticker-label{
  position:absolute;left:0;top:0;bottom:0;z-index:2;
  background:var(--safety);color:#0A0A0A;
  padding:0 22px;display:flex;align-items:center;gap:10px;
  font-family:var(--font-sans);font-size:13px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;
  box-shadow:8px 0 16px rgba(0,0,0,0.4);
}
.ticker-label::after{
  content:'';position:absolute;right:-12px;top:0;bottom:0;width:12px;
  background:linear-gradient(to right, var(--safety), transparent);
}
.ticker-track{
  display:flex;gap:40px;white-space:nowrap;width:max-content;
  animation:ticker 70s linear infinite;
  font-family:var(--font-mono);font-size:13px;font-weight:500;
  padding-left:220px;
}
.ticker-item{display:flex;align-items:center;gap:12px;color:var(--fg-1)}
.ticker-item b{color:var(--safety);font-weight:700}
.ticker-item .chip{
  font-family:var(--font-sans);font-size:10px;padding:4px 8px;background:var(--bg-3);color:var(--hivis);
  border-radius:4px;letter-spacing:0.04em;text-transform:uppercase;
  border:1px solid rgba(245,213,71,0.2);font-weight:700;
}

@media (max-width:900px){
  .hero-main{grid-template-columns:1fr;gap:40px;padding-bottom:40px}
  .waybill{max-width:440px}
  .ticker-track{padding-left:180px}
}

/* ============================================================
   SECTION DIVIDER · Conveyor Belt
   ============================================================ */
.conveyor-divider{
  height:60px;margin:0;position:relative;overflow:hidden;
  border-top:1px solid var(--line-mid);border-bottom:1px solid var(--line-mid);
  background:
    repeating-linear-gradient(90deg,
      var(--bg-2) 0 40px,
      rgba(0,0,0,0.2) 40px 42px);
  display:flex;align-items:center;
}
.conveyor-divider::before,.conveyor-divider::after{
  content:'';position:absolute;left:0;right:0;height:4px;
  background:repeating-linear-gradient(90deg,
    var(--safety) 0 10px,
    #0A0A0A 10px 20px);
}
.conveyor-divider::before{top:0}
.conveyor-divider::after{bottom:0}
.conveyor-label{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-family:var(--font-sans);font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--fg-0);
  display:flex;align-items:center;gap:14px;
  padding:0 20px;background:var(--bg-0);
  z-index:2;
}
.conveyor-label::before,.conveyor-label::after{
  content:'●';color:var(--safety);font-size:10px;
}

/* ============================================================
   SECTION HEADERS
   ============================================================ */
.section-head{
  padding:100px 0 40px;
  display:grid;grid-template-columns:1fr auto;gap:32px;align-items:end;
  border-bottom:2px solid var(--line-mid);
  position:relative;
}
.section-head::before{
  content:'';position:absolute;left:0;bottom:-2px;width:140px;height:2px;background:var(--safety);
}
.section-head-left{display:flex;flex-direction:column;gap:20px}
.section-num{
  display:flex;align-items:center;gap:12px;
  font-family:var(--font-mono);font-size:11.5px;color:var(--fg-2);letter-spacing:0.02em;text-transform:uppercase;font-weight:600;
}
.section-num .n{
  background:var(--safety);color:#0A0A0A;
  padding:5px 10px;border-radius:4px;
  font-family:var(--font-sans);font-size:12px;font-weight:700;letter-spacing:0;
}
.section-head h2{
  font-family:var(--font-display);font-weight:600;
  font-size:clamp(44px, 6.5vw, 96px);letter-spacing:-0.035em;line-height:1;color:var(--fg-0);
  max-width:16ch;
}
.section-head h2 em{font-style:normal;font-weight:500;color:var(--hivis)}
.section-head-note{
  font-family:var(--font-sans);font-size:13px;color:var(--fg-2);
  text-align:right;max-width:280px;line-height:1.65;letter-spacing:0;font-weight:400;
}
@media (max-width:760px){
  .section-head{grid-template-columns:1fr}
  .section-head-note{text-align:left}
}

/* ============================================================
   LIVE BOARD · Departures-style KPI Metrics
   ============================================================ */
.metrics{padding-bottom:60px}
.live-board{
  margin-top:40px;
  border:1px solid var(--line-mid);border-radius:10px;overflow:hidden;
  background:var(--bg-1);
  box-shadow:0 24px 60px -20px rgba(0,0,0,0.5);
}
.live-board-header{
  padding:14px 20px;
  background:#0A0A0A;
  display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;
  border-bottom:2px solid var(--hivis);
}
.live-board-title{
  font-family:var(--font-sans);font-size:14px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--hivis);
  display:flex;align-items:center;gap:12px;
}
.live-board-title::before{content:'';width:10px;height:10px;background:var(--hivis);border-radius:1px}
.live-board-meta{
  display:flex;gap:18px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);letter-spacing:0.08em;
}
.live-board-meta b{color:var(--fg-0);font-weight:500}
.live-board-meta .live{color:var(--green);display:flex;align-items:center;gap:6px}

.metrics-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
}
.metric{
  padding:28px 24px;position:relative;
  border-right:1px solid var(--line-mid);
  display:flex;flex-direction:column;gap:16px;
  min-height:280px;
  background:var(--bg-1);
  transition:background 0.3s ease;
}
.metric:hover{background:var(--bg-2)}
.metric:last-child{border-right:none}
.metric-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.metric-label{
  font-family:var(--font-sans);font-size:13px;font-weight:700;color:var(--fg-0);letter-spacing:-0.005em;
  line-height:1.3;
}
.metric-id{
  font-family:var(--font-mono);font-size:10px;color:var(--fg-3);letter-spacing:0;font-weight:500;
  padding:3px 7px;background:rgba(0,0,0,0.4);border-radius:3px;
}
.metric-viz{
  flex:1;display:flex;align-items:center;justify-content:center;min-height:110px;
}
.metric-value{
  font-family:var(--font-display);font-size:56px;font-weight:600;
  line-height:0.95;color:var(--fg-0);letter-spacing:-0.035em;
  display:flex;align-items:baseline;gap:2px;
}
.metric-value .unit{
  font-family:var(--font-sans);font-size:22px;font-weight:600;color:var(--safety);
  font-style:normal;margin-left:6px;letter-spacing:-0.01em;
}
.metric-sub{
  font-size:13px;color:var(--fg-2);line-height:1.55;margin-top:auto;
  font-family:var(--font-sans);letter-spacing:0.01em;
}
.metric-sub strong{color:var(--safety);font-weight:600}

@media (max-width:1000px){
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
  .metric:nth-child(2n){border-right:none}
  .metric:nth-child(-n+2){border-bottom:1px solid var(--line-mid)}
}
@media (max-width:560px){
  .metrics-grid{grid-template-columns:1fr}
  .metric{border-right:none;border-bottom:1px solid var(--line-mid)}
  .metric:last-child{border-bottom:none}
}

/* ============================================================
   SCOPE · Operating Blueprint
   ============================================================ */
.scope{padding-bottom:60px}
.scope-panel{
  margin-top:40px;padding:32px 28px;
  border:1px solid var(--line-mid);border-radius:10px;
  background:
    linear-gradient(180deg, var(--bg-1), var(--bg-2));
  position:relative;overflow:hidden;
}
.scope-panel-corners{position:absolute;inset:12px;pointer-events:none;z-index:1}
.scope-panel-corners span{
  position:absolute;width:16px;height:16px;
  border:2px solid var(--teal);
}
.scope-panel-corners span.tl{top:0;left:0;border-right:none;border-bottom:none}
.scope-panel-corners span.tr{top:0;right:0;border-left:none;border-bottom:none}
.scope-panel-corners span.bl{bottom:0;left:0;border-right:none;border-top:none}
.scope-panel-corners span.br{bottom:0;right:0;border-left:none;border-top:none}

.scope-panel::before{
  content:'';position:absolute;inset:0;pointer-events:none;opacity:.3;
  background-image:
    linear-gradient(to right, rgba(63,176,166,.15) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(63,176,166,.15) 1px, transparent 1px);
  background-size:32px 32px;
}

.scope-header{
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:16px;margin-bottom:28px;
  border-bottom:1px dashed var(--line-mid);
  font-family:var(--font-mono);font-size:11px;color:var(--fg-2);
  letter-spacing:0.2em;text-transform:uppercase;font-weight:500;
  position:relative;z-index:2;
}
.scope-header .rev{color:var(--teal)}

.scope-diagram{
  position:relative;z-index:2;
  display:grid;grid-template-columns:60px repeat(5, 1fr) 60px;
  gap:12px;align-items:stretch;
  margin-bottom:28px;
}
.scope-endpoint{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  font-family:var(--font-mono);font-size:9px;color:var(--fg-3);letter-spacing:0.14em;text-transform:uppercase;
  padding:20px 0;
}
.scope-endpoint svg{width:32px;height:32px;opacity:0.6}
.scope-endpoint::after{content:'';width:1px;flex:1;background:var(--line-mid)}

.scope-stage-node{
  padding:16px 14px;border-radius:8px;
  background:rgba(0,0,0,0.35);border:1px solid var(--line-mid);
  display:flex;flex-direction:column;gap:8px;
  position:relative;
  transition:all .3s ease;
  cursor:default;
}
.scope-stage-node::after{
  content:'→';position:absolute;right:-14px;top:50%;transform:translateY(-50%);
  color:var(--safety);font-weight:700;font-size:14px;
  z-index:3;
}
.scope-stage-node:nth-last-child(2)::after{display:none}
.scope-stage-node:hover{border-color:var(--safety);background:rgba(255,122,26,0.06);transform:translateY(-2px)}

.scope-stage-num{
  font-family:var(--font-display);font-size:34px;color:var(--safety);line-height:0.9;letter-spacing:-0.03em;font-weight:700;
}
.scope-stage-node:nth-child(3) .scope-stage-num{color:var(--hivis)}
.scope-stage-node:nth-child(4) .scope-stage-num{color:var(--safety)}
.scope-stage-node:nth-child(5) .scope-stage-num{color:var(--teal)}
.scope-stage-node:nth-child(6) .scope-stage-num{color:var(--green)}

.scope-stage-node h4{
  font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--fg-0);
  letter-spacing:-0.02em;line-height:1.1;
}
.scope-stage-node p{
  font-family:var(--font-sans);font-size:12.5px;color:var(--fg-2);line-height:1.5;
}
.scope-stage-node .tools{
  display:flex;flex-wrap:wrap;gap:4px;margin-top:auto;padding-top:8px;
  border-top:1px dashed var(--line);
}
.scope-stage-node .tool{
  font-family:var(--font-mono);font-size:10px;color:var(--fg-1);
  padding:2px 6px;border-radius:2px;background:rgba(255,255,255,0.04);
  letter-spacing:0;font-weight:500;text-transform:uppercase;
}

@media (max-width:900px){
  .scope-diagram{grid-template-columns:1fr;gap:10px}
  .scope-endpoint{display:none}
  .scope-stage-node::after{display:none}
}

/* ============================================================
   EXPERIENCE · ROUTE LOG + GANTT
   ============================================================ */
.experience{padding-bottom:60px}
.gantt{
  margin-top:40px;padding:24px;
  border:1px solid var(--line-mid);border-radius:10px;
  background:var(--bg-1);
  overflow-x:auto;
}
.gantt-head{
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:14px;margin-bottom:14px;border-bottom:1px dashed var(--line-mid);
}
.gantt-head-title{
  font-family:var(--font-sans);font-size:14px;font-weight:700;letter-spacing:0.02em;color:var(--fg-0);text-transform:uppercase;
}
.gantt-head-meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);font-weight:500}

.gantt-scale{
  position:relative;height:32px;
  display:grid;grid-template-columns:160px repeat(8,1fr);
  align-items:center;
  border-bottom:1px solid var(--line-mid);
  margin-bottom:8px;
}
.gantt-scale .void{border-right:1px solid var(--line-mid)}
.gantt-scale .year{
  font-family:var(--font-mono);font-size:11px;color:var(--fg-2);
  border-left:1px solid var(--line);padding:0 12px;letter-spacing:0.08em;font-weight:500;
  display:flex;align-items:center;gap:10px;height:100%;
}
.gantt-scale .year.now{color:var(--safety);font-weight:600}
.gantt-scale .year.now::before{content:'●';color:var(--safety);font-size:8px}

.gantt-rows{display:flex;flex-direction:column;gap:8px}
.gantt-row{
  display:grid;grid-template-columns:160px 1fr;gap:0;align-items:center;
  padding:10px 0;
}
.gantt-row-label{display:flex;flex-direction:column;gap:3px;padding-right:16px}
.gantt-row-label .name{font-size:14px;color:var(--fg-0);font-weight:600;letter-spacing:-0.005em}
.gantt-row-label .org{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-2);letter-spacing:0.04em;font-weight:500}

.gantt-track{position:relative;height:30px;background:rgba(0,0,0,0.3);border-radius:4px;border:1px solid var(--line)}
.gantt-bar{
  position:absolute;top:0;bottom:0;border-radius:4px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 12px;
  font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:-0.005em;color:#0A0A0A;
  transition:all .25s ease;cursor:default;
  overflow:hidden;
}
.gantt-bar.safety{background:linear-gradient(90deg, var(--safety), #FF9340)}
.gantt-bar.teal{background:linear-gradient(90deg, var(--teal), #5BC4BA)}
.gantt-bar.hivis{background:linear-gradient(90deg, var(--hivis), #F7E07A)}
.gantt-bar.outline{background:rgba(255,255,255,0.05);border:1px dashed var(--line-strong);color:var(--fg-2);font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em}
.gantt-bar:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,0.4)}
.gantt-bar .dur{margin-left:auto;opacity:.75;font-size:11px}

.gantt-legend{
  display:flex;gap:22px;flex-wrap:wrap;margin-top:20px;padding-top:16px;
  border-top:1px dashed var(--line-mid);
  font-family:var(--font-mono);font-size:11px;color:var(--fg-2);letter-spacing:0.1em;text-transform:uppercase;font-weight:500;
}
.gantt-legend span{display:flex;align-items:center;gap:8px}
.gantt-legend .sw{width:16px;height:10px;border-radius:2px}

/* Detailed role cards below Gantt */
.roles{display:flex;flex-direction:column;gap:0;margin-top:0}
.role{
  display:grid;grid-template-columns:300px 1fr;gap:48px;
  padding:56px 0;border-top:1px solid var(--line-mid);position:relative;
}
.role:first-of-type{border-top:2px solid var(--safety)}
.role-side{display:flex;flex-direction:column;gap:16px;position:sticky;top:110px;align-self:start;height:fit-content}
.role-period{
  font-family:var(--font-mono);font-size:12px;color:var(--hivis);letter-spacing:0.1em;text-transform:uppercase;font-weight:600;
  padding:5px 10px;background:rgba(245,213,71,0.08);border:1px solid rgba(245,213,71,0.22);border-radius:4px;
  width:fit-content;
}
.role-company{
  font-family:var(--font-display);font-size:44px;font-weight:600;
  letter-spacing:-0.035em;line-height:1;color:var(--fg-0);
}
.role-title{font-size:14px;color:var(--fg-1);line-height:1.55;font-weight:500}
.role-title span{display:block;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);letter-spacing:0;margin-top:4px;font-weight:400}
.role-industry{
  display:inline-flex;align-items:center;gap:8px;padding:7px 12px;
  background:var(--bg-2);border:1px solid var(--line-mid);border-radius:5px;
  font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:0.02em;color:var(--fg-0);text-transform:uppercase;
  width:fit-content;
}
.role-industry::before{content:'▮';color:var(--safety);font-size:11px}

}

.achievement-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.achievement-number{

}
.achievement-num-label{
  font-family:var(--font-mono);font-size:10px;color:var(--fg-3);letter-spacing:0.02em;text-transform:uppercase;font-weight:600;
}
.achievement-label{
  font-family:var(--font-sans);font-size:13px;color:var(--safety);letter-spacing:0.02em;font-weight:700;text-transform:uppercase;
}
.achievement-text{font-size:14px;color:var(--fg-1);line-height:1.6;font-weight:400}

.role-stack{

.chip{

@media (max-width:900px){

/* ============================================================
   CASE STUDY
   ============================================================ */
.case{padding-bottom:60px}
.case-card{
  margin-top:40px;
  border:1px solid var(--line-mid);border-radius:10px;overflow:hidden;

  position:relative;

}
.case-card::before{

}
.case-story{padding:64px 44px 44px;display:flex;flex-direction:column;gap:20px}
.case-label{

}
.case-title{

}
.case-title em{font-style:normal;font-weight:500;color:var(--green)}
.case-copy{font-size:16px;color:var(--fg-1);line-height:1.75;max-width:48ch;font-weight:400}
.case-copy b{color:var(--fg-0);font-weight:600}

.case-bullets{

}
.case-bullets li{display:flex;gap:12px;align-items:flex-start;line-height:1.6}

.case-viz{

}
.case-viz-head{
  display:flex;justify-content:space-between;align-items:center;

}

@media (max-width:900px){

/* ============================================================
   PROJECTS · CONTAINER CARDS
   ============================================================ */
.projects{padding-bottom:60px}
.projects-grid{

}

.project-header{

}

}
.project-header .no{color:var(--fg-0);font-weight:700}

}
.tag-built{background:rgba(255,122,26,0.15);color:var(--safety);border:1px solid rgba(255,122,26,0.3)}
.tag-ops{background:rgba(245,213,71,0.12);color:var(--hivis);border:1px solid rgba(245,213,71,0.3)}
.tag-sap{background:rgba(110,231,168,0.1);color:var(--green);border:1px solid rgba(110,231,168,0.3)}

.project-body{padding:24px 20px;display:flex;flex-direction:column;gap:14px;flex:1}
.project-year{font-family:var(--font-mono);font-size:10.5px;color:var(--hivis);letter-spacing:0.02em;font-weight:600;text-transform:uppercase}
.project h3{
  font-family:var(--font-display);font-size:24px;font-weight:600;line-height:1.15;letter-spacing:-0.025em;color:var(--fg-0);
}
.project.lg h3{font-size:32px}
.project-desc{font-size:14px;color:var(--fg-1);line-height:1.65;font-weight:400}

.project-stats{
  display:grid;grid-template-columns:repeat(2,1fr);gap:0;
  border-top:1px dashed var(--line-mid);margin-top:auto;padding-top:14px;
}
.project-stat{
  padding:6px 0;display:flex;flex-direction:column;gap:3px;

}
.project-stat:last-child{border-right:none;padding-left:14px;padding-right:0}
.project-stat .num{font-family:var(--font-display);font-size:28px;color:var(--hivis);line-height:1;font-style:normal;font-weight:700;letter-spacing:-0.03em}
.project-stat .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);letter-spacing:0;text-transform:uppercase;font-weight:600}

/* ============================================================

   ============================================================ */
.stack{padding-bottom:60px}
.kanban{

}
.kanban::before{

.kanban-col:nth-child(3){border-top-color:var(--teal)}

.kanban-col-head{
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:10px;border-bottom:1px dashed var(--line-mid);
}
.kanban-col-head h4{
  font-family:var(--font-sans);font-size:14px;font-weight:700;letter-spacing:0.04em;color:var(--fg-0);text-transform:uppercase;

.kanban-col-head .count{

.kanban-card .level.advanced{background:rgba(245,213,71,0.15);color:var(--hivis)}

@media (max-width:1000px){.kanban{grid-template-columns:repeat(2,1fr)}}
@media (max-width:560px){.kanban{grid-template-columns:1fr}}

/* ============================================================
   CREDENTIALS · Passport Stamps
   ============================================================ */
.creds{padding-bottom:60px}
.creds-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:40px;margin-top:40px}
.creds-col h4{
  font-family:var(--font-sans);font-size:13px;color:var(--fg-0);letter-spacing:0.06em;

}
.creds-col h4::after{content:'';position:absolute;bottom:-2px;left:0;width:60px;height:2px;background:var(--safety)}

.edu-item{

  padding:22px 0;border-bottom:1px dashed var(--line-mid);
}
.edu-item:last-child{border-bottom:none}
.edu-year{
  font-family:var(--font-mono);font-size:11px;color:var(--hivis);letter-spacing:0.02em;font-weight:600;text-transform:uppercase;
}
.edu-body h5{
  font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--fg-0);margin-bottom:4px;letter-spacing:-0.02em;
}
.edu-body p{font-family:var(--font-sans);font-size:12.5px;color:var(--fg-2);letter-spacing:0;font-weight:400}
.edu-status{

  padding:4px 10px;border-radius:3px;font-weight:600;
}
.edu-status.live{color:var(--green);background:rgba(110,231,168,0.1)}
.edu-status.done{color:var(--fg-3);background:rgba(0,0,0,0.3)}

.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.lang{

  background:var(--bg-1);display:flex;flex-direction:column;gap:6px;
}
.lang-name{font-size:14.5px;color:var(--fg-0);font-weight:600}
.lang-level{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);letter-spacing:0.1em;text-transform:uppercase;font-weight:500}
.lang-bar{height:3px;background:var(--bg-3);border-radius:2px;overflow:hidden;margin-top:4px}

.certs{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.cert{

.cert-name{font-size:14px;color:var(--fg-0);font-weight:500}

  box-shadow:0 24px 60px -20px rgba(0,0,0,0.5);
}
.contact-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:10px;

  z-index:2;
}
.contact-inner{padding:72px 48px 48px;position:relative}
.contact-label{
  font-family:var(--font-sans);font-size:13px;color:var(--hivis);letter-spacing:0.04em;text-transform:uppercase;
  padding:6px 12px;background:rgba(245,213,71,0.1);border:1px solid rgba(245,213,71,0.3);border-radius:4px;
  width:fit-content;display:inline-block;font-weight:700;
}
.contact-title{
  font-family:var(--font-display);font-size:clamp(48px, 8vw, 120px);font-weight:600;

  margin:20px 0 24px;
}
.contact-title em{font-style:normal;font-weight:500;color:var(--hivis)}
.contact-copy{font-size:17px;max-width:58ch;color:var(--fg-1);line-height:1.75;font-weight:400}
.contact-copy b{color:var(--fg-0);font-weight:600}

.contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:40px}
.contact-item{
  display:flex;flex-direction:column;gap:6px;padding:22px;
  border:1px solid var(--line-mid);border-radius:6px;background:var(--bg-2);
  transition:all .25s ease;position:relative;overflow:hidden;
}
.contact-item::before{

.contact-item:hover{border-color:var(--safety);transform:translateY(-4px)}

.contact-stamp{

.contact-ctas{margin-top:40px;display:flex;gap:12px;flex-wrap:wrap}

@media (max-width:760px){

.footer{
  margin-top:40px;padding:28px 0;border-top:1px solid var(--line-mid);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;
  font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:0;font-weight:500;
}
.footer b{color:var(--fg-1);font-weight:600}

/* ============================================================
   SUPPLY CHAIN NETWORK TOPOLOGY
   ============================================================ */
.network{padding-bottom:60px}
.network-card{
  margin-top:40px;
  border:1px solid var(--line-mid);border-radius:10px;
  background:linear-gradient(180deg, var(--bg-1), var(--bg-2));
  position:relative;overflow:hidden;
  box-shadow:0 24px 60px -20px rgba(0,0,0,0.5);
}
.network-head{
  padding:16px 22px;
  display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;
  background:#0A0A0A;
  border-bottom:2px solid var(--safety);
}
.network-head-title{
  font-family:var(--font-sans);font-size:14px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--safety);display:flex;align-items:center;gap:12px;
}
.network-head-title::before{content:'';width:10px;height:10px;background:var(--safety);border-radius:1px;box-shadow:0 0 8px var(--safety)}
.network-head-meta{
  display:flex;gap:18px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);font-weight:500;
}
.network-head-meta b{color:var(--fg-0);font-weight:700}
.network-head-meta .live{color:var(--green);display:flex;align-items:center;gap:6px}

.network-viz{
  padding:32px 20px;position:relative;min-height:420px;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(63,176,166,0.06) 0%, transparent 70%);
}
.network-viz::before{
  content:'';position:absolute;inset:0;pointer-events:none;opacity:0.4;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size:40px 40px;
}

.network-legend{
  padding:16px 22px;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;
  border-top:1px solid var(--line-mid);background:rgba(0,0,0,0.25);
}
.network-legend-items{display:flex;gap:20px;flex-wrap:wrap}
.network-legend-item{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:11px;color:var(--fg-2);font-weight:500;letter-spacing:0;text-transform:uppercase;
}
.network-legend-item .sw{width:12px;height:12px;border-radius:2px}
.network-legend-stats{
  display:flex;gap:20px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);font-weight:500;
}
.network-legend-stats b{color:var(--fg-0);font-weight:700}

/* Network animations */
.flow-line{
  stroke-dasharray:4 4;
  animation:dashflow 2s linear infinite;
}
.node-pulse{
  animation:nodePulse 2.4s ease-in-out infinite;
  transform-origin:center;
  transform-box:fill-box;
}
.node-pulse.d1{animation-delay:.3s}
.node-pulse.d2{animation-delay:.6s}
.node-pulse.d3{animation-delay:.9s}
.node-pulse.d4{animation-delay:1.2s}
@keyframes nodePulse{
  0%,100%{opacity:0.9}
  50%{opacity:1;filter:drop-shadow(0 0 6px currentColor)}
}

/* Packet animation */
.packet{
  fill:var(--hivis);
  filter:drop-shadow(0 0 6px var(--hivis));
}

/* ============================================================
   INVENTORY HEATMAP
   ============================================================ */
.heatmap-panel{
  margin-top:32px;padding:24px;
  border:1px solid var(--line-mid);border-radius:10px;
  background:var(--bg-1);
}
.heatmap-head{
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
  padding-bottom:16px;margin-bottom:20px;
  border-bottom:1px dashed var(--line-mid);
}
.heatmap-title{
  font-family:var(--font-sans);font-size:14px;font-weight:700;letter-spacing:0.02em;text-transform:uppercase;color:var(--fg-0);
  display:flex;align-items:center;gap:10px;
}
.heatmap-title::before{content:'';width:8px;height:8px;background:var(--teal);border-radius:1px}
.heatmap-meta{
  display:flex;gap:18px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);font-weight:500;
}
.heatmap-meta b{color:var(--fg-0);font-weight:700}

.heatmap-grid{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:14px 16px;
  align-items:center;
}
.heatmap-row-label{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:11px;color:var(--fg-1);font-weight:600;letter-spacing:0;text-transform:uppercase;
}
.heatmap-row-label .seg{
  width:22px;height:22px;border-radius:4px;
  display:grid;place-items:center;
  font-family:var(--font-sans);font-size:11px;font-weight:800;color:#0A0A0A;
}
.heatmap-row-label .seg.a{background:var(--safety)}
.heatmap-row-label .seg.b{background:var(--hivis)}
.heatmap-row-label .seg.c{background:var(--teal);color:#FFFFFF}
.heatmap-row{
  display:grid;grid-template-columns:repeat(16,1fr);gap:3px;
  height:28px;
}
.heat-cell{
  border-radius:2px;border:1px solid rgba(255,255,255,0.06);
  transition:transform .2s ease;
  position:relative;
}
.heat-cell:hover{transform:scale(1.1);z-index:2;border-color:var(--fg-0)}
.heat-cell.h0{background:rgba(255,90,90,0.25)}    /* critical low */
.heat-cell.h1{background:rgba(255,122,26,0.3)}    /* low */
.heat-cell.h2{background:rgba(245,213,71,0.35)}   /* warning */
.heat-cell.h3{background:rgba(63,176,166,0.3)}    /* normal */
.heat-cell.h4{background:rgba(110,231,168,0.45)}  /* healthy */
.heat-cell.h5{background:rgba(110,231,168,0.75)}  /* high */

.heatmap-footer{
  margin-top:20px;padding-top:16px;border-top:1px dashed var(--line-mid);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;
}
.heatmap-scale{
  display:flex;gap:4px;align-items:center;
  font-family:var(--font-mono);font-size:10px;color:var(--fg-2);font-weight:500;text-transform:uppercase;letter-spacing:0;
}
.heatmap-scale .scale-bar{
  display:flex;gap:2px;
}
.heatmap-scale .scale-bar span{
  width:14px;height:10px;border-radius:1px;
}
.heatmap-note{
  font-family:var(--font-sans);font-size:12px;color:var(--fg-2);font-weight:400;
}
.heatmap-note b{color:var(--fg-0);font-weight:600}

/* ============================================================
   S&amp;OP CYCLE WHEEL
   ============================================================ */
.sop-wheel{
  display:flex;align-items:center;gap:28px;
  padding:24px;margin-top:20px;
  border:1px solid var(--line-mid);border-radius:10px;
  background:var(--bg-2);
}
.sop-wheel-viz{flex-shrink:0;width:260px;height:260px;position:relative}
.sop-wheel-viz svg{width:100%;height:100%}
.sop-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-family:var(--font-sans);pointer-events:none;
  text-align:center;
}
.sop-center .big{
  font-size:28px;font-weight:800;color:var(--safety);letter-spacing:-0.03em;line-height:1;
}
.sop-center .sm{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);letter-spacing:0.04em;text-transform:uppercase;font-weight:600}

.sop-wheel-list{
  flex:1;display:flex;flex-direction:column;gap:10px;
}
.sop-step{
  display:grid;grid-template-columns:32px 1fr auto;gap:14px;align-items:center;
  padding:12px 14px;
  background:var(--bg-1);border:1px solid var(--line-mid);border-radius:8px;
  transition:all .2s ease;
}
.sop-step:hover{border-color:var(--safety);background:var(--bg-3);transform:translateX(3px)}
.sop-step-num{
  width:32px;height:32px;border-radius:8px;
  display:grid;place-items:center;
  font-family:var(--font-sans);font-size:12px;font-weight:800;color:#0A0A0A;
}
.sop-step:nth-child(1) .sop-step-num{background:var(--safety)}
.sop-step:nth-child(2) .sop-step-num{background:var(--hivis)}
.sop-step:nth-child(3) .sop-step-num{background:var(--teal)}
.sop-step:nth-child(4) .sop-step-num{background:var(--green)}
.sop-step-body h5{
  font-family:var(--font-sans);font-size:13px;font-weight:700;color:var(--fg-0);letter-spacing:-0.005em;
}
.sop-step-body p{
  font-family:var(--font-sans);font-size:11.5px;color:var(--fg-2);line-height:1.4;margin-top:2px;font-weight:400;
}
.sop-step-week{
  font-family:var(--font-mono);font-size:10px;color:var(--fg-2);font-weight:600;letter-spacing:0;text-transform:uppercase;
  padding:3px 8px;background:rgba(0,0,0,0.3);border-radius:3px;
}

@media (max-width:760px){
  .sop-wheel{flex-direction:column}
  .sop-wheel-viz{width:220px;height:220px}
}

/* Network + Heatmap responsive */
@media (max-width:700px){
  .heatmap-grid{grid-template-columns:60px 1fr}
  .heatmap-row{grid-template-columns:repeat(8,1fr)}
}


.fade-up{opacity:0;transform:translateY(30px);transition:opacity .8s ease, transform .8s ease}
.fade-up.in{opacity:1;transform:none}
.fade-up.d1{transition-delay:.1s}
.fade-up.d2{transition-delay:.2s}
.fade-up.d3{transition-delay:.3s}
.fade-up.d4{transition-delay:.4s}

/* Port scene animations */
.crane-arm{animation:cranemove 6s ease-in-out infinite;transform-origin:center bottom}
.crane-load{animation:loadswing 4s ease-in-out infinite;transform-origin:top center}
.ship{animation:shipbob 5s ease-in-out infinite}
.smoke{animation:loadswing 3s ease-in-out infinite;transform-origin:bottom center}

/* Chart animated path */
.chart-area{opacity:0;animation:fadeInChart 1.4s ease-out forwards}
@keyframes fadeInChart{to{opacity:1}}
.spark{stroke-dasharray:500;stroke-dashoffset:500;transition:stroke-dashoffset 2.5s ease}
.spark.in{stroke-dashoffset:0}
.flow-path{stroke-dasharray:6 8;animation:dashflow 3s linear infinite}

/* Container stack */
.container-stack rect{transform-origin:bottom;animation:stackIn .6s ease-out backwards}
.container-stack rect:nth-child(1){animation-delay:.1s}
.container-stack rect:nth-child(2){animation-delay:.2s}
.container-stack rect:nth-child(3){animation-delay:.3s}
.container-stack rect:nth-child(4){animation-delay:.4s}
.container-stack rect:nth-child(5){animation-delay:.5s}
.container-stack rect:nth-child(6){animation-delay:.6s}
@keyframes stackIn{from{transform:scaleY(0)}to{transform:scaleY(1)}}

/* Background coordinates typing */
.coord-code{
  position:absolute;
  font-family:var(--font-mono);font-size:10px;
  color:rgba(243,235,218,0.06);
  letter-spacing:0.2em;font-weight:500;

<script>
/* Fade reveal */
const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }
  });
},{threshold:.12,rootMargin:'0px 0px -50px 0px'});
document.querySelectorAll('.fade-up').forEach(el=>io.observe(el));

/* Spark paths */
const sparkIO = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){ e.target.classList.add('in'); sparkIO.unobserve(e.target); }
  });
},{threshold:.4});
document.querySelectorAll('.spark').forEach(el=>sparkIO.observe(el));

/* Counter animation */
const counterIO = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const el = e.target;
      const target = parseFloat(el.dataset.target);
      const duration = 1500;
      const start = performance.now();
      function tick(t){
        const p = Math.min(1,(t-start)/duration);
        const eased = 1 - Math.pow(1-p,3);
        const value = target*eased;
        el.textContent = value >= 10 ? Math.round(value) : value.toFixed(1);
        if(p < 1) requestAnimationFrame(tick);
        else el.textContent = target;
      }
      requestAnimationFrame(tick);
      counterIO.unobserve(el);
    }
  });
},{threshold:.4});
document.querySelectorAll('.counter').forEach(el=>counterIO.observe(el));

/* Live clock */
function updateClock(){
  const now = new Date();
  const hh = String(now.getUTCHours()).padStart(2,'0');
  const mm = String(now.getUTCMinutes()).padStart(2,'0');
  const ss = String(now.getUTCSeconds()).padStart(2,'0');
  const el = document.getElementById('clock');
  if(el) el.textContent = `${hh}:${mm}:${ss} UTC`;
}
updateClock(); setInterval(updateClock,1000);

/* Today date */
function setToday(){
  const now = new Date();
  const m = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][now.getMonth()];
  const d = String(now.getDate()).padStart(2,'0');
  const el = document.getElementById('today');
  if(el) el.textContent = `${d} ${m} ${String(now.getFullYear()).slice(2)}`;
}
setToday();

/* Smooth anchor */
document.querySelectorAll('a[href^=&quot;#&quot;]').forEach(a=>{
  a.addEventListener('click',e=>{
    const id = a.getAttribute('href');
    if(id.length > 1){
      const t = document.querySelector(id);
      if(t){
        e.preventDefault();
        window.scrollTo({top:t.offsetTop - 60, behavior:'smooth'});
      }
    }
  });
});

/* Parallax on port scene */
const port = document.querySelector('.port-scene');
if(port){
  window.addEventListener('scroll',()=>{
    const y = window.scrollY;
    if(y < window.innerHeight){
      port.style.transform = `translateY(${y*0.08}px)`;
    }
  },{passive:true});
}
</script>

    <span class="td" id="td"></span>

  </button>

<script>
let cur = 'advanced';
const frames = {
  simple:   document.getElementById('fs'),
  advanced: document.getElementById('fa')
};

function activate(ver) {
  cur = ver;
  // Hide all
  Object.values(frames).forEach(f => { f.classList.remove('on'); });
  // Show chosen
  frames[ver].classList.add('on');
  // Update toggle
  const tb = document.getElementById('tb');
  const tt = document.getElementById('tt');
  const td = document.getElementById('td');
  if (ver === 'advanced') {
    tb.className = '';
    tt.textContent = 'Analyst View';
    td.style.cssText = 'background:#F59E0B;box-shadow:0 0 7px rgba(245,158,11,.8)';
  } else {
    tb.className = 'simple';
    tt.textContent = 'Operations View';
    td.style.cssText = 'background:#34D399;box-shadow:0 0 7px rgba(52,211,153,.8)';
  }
  document.getElementById('tgl').classList.add('on');
}

window.sw = function() {
  const next = cur === 'advanced' ? 'simple' : 'advanced';
  const curF = frames[cur];
  curF.style.opacity = '0';
  curF.style.transition = 'opacity .25s ease';
  setTimeout(() => {
    curF.style.opacity = '';
    curF.style.transition = '';
    activate(next);
  }, 260);
};

// Boot directly into Operations View (advanced)
activate('advanced');
</script>
